<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <h1>Form basic</h1>
        <label for="fname">First name:</label>
        <input type="text" id="fname" name="fname" value="John" />

        <br /><label for="lname">Last name:</label>
        <input type="text" id="lname" name="lname" value="Doe" /><br /><br />
        <input type="submit" value="Submit" />
      </fieldset>
    </form>

    <p>Choose your favorite Web language:</p>

    <form>
      <input type="radio" id="html" name="fav_language" value="HTML" checked />
      <label for="html">HTML</label><br />

      <input type="radio" id="css" name="fav_language" value="CSS" />
      <label for="css">CSS</label><br />

      <input
        type="radio"
        id="javascript"
        name="fav_language"
        value="JavaScript"
      />
      <label for="javascript">JavaScript</label><br />

      <input type="radio" id="python" name="fav_language" value="PYTHON" />
      <label for="python">PYTHON</label><br />

      <input type="radio" id="cpp" name="fav_language" value="C++" />
      <label for="cpp">C++</label><br />
    </form>

    <h2>Checkboxes</h2>

    <form action="">
      <input
        type="checkbox"
        id="vehicle1"
        name="vehicle1"
        value="Bike"
        checked
      />
      <label for="vehicle1"> I have a bike</label><br />
      <input type="checkbox" id="vehicle2" name="vehicle2" value="Car" />
      <label for="vehicle2"> I have a car</label><br />
      <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat" />
      <label for="vehicle3"> I have a boat</label><br /><br />
      <input type="submit" value="Submit" />
    </form>

    <h1>Input type</h1>
    <form>
      <label for="username">Username:</label><br />
      <input type="text" id="username" name="username" /><br />
      <label for="pwd">Password:</label><br />
      <input type="password" id="pwd" name="pwd" /><br /><br />

      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />

      <input type="button" onclick="alert('Hello World!')" value="Click Me!" />
      <button type="button" onclick="alert('hello world!')">
        Click me !!!!!!!
      </button>
      <br /><br />

      <label for="favcolor">Select your favorite color:</label>
      <input type="color" id="favcolor" name="favcolor" />
      <br /><br />

      <label for="birthday">Birthday:</label>
      <input type="date" id="birthday" name="birthday" />
      <br /><br />

      <label for="datemax">Enter a date before 1980-01-01:</label>
      <input
        type="date"
        id="datemax"
        name="datemax"
        max="1979-12-31"
      /><br /><br />
      <label for="datemin">Enter a date after 2000-01-01:</label>
      <input type="date" id="datemin" name="datemin" min="2000-01-02" />
      <br /><br />

      <label for="birthdaytime">Birthday (date and time):</label>
      <input type="datetime-local" id="birthdaytime" name="birthdaytime" />
      <br /><br />

      <label for="email">Enter your email:</label>
      <input type="email" id="email" name="email" />
      <br /><br />

      <label for="myfile">Select a file:</label>
      <input type="file" id="myfile" name="myfile" />

      <input type="hidden" id="custId" name="custId" value="3487" />
      <br /><br />

      <label for="quantity">Quantity (between 1 and 5):</label>
      <input
        type="number"
        id="quantity"
        name="quantity"
        min="1"
        max="5"
        required
      />
      <br /><br />

      <label for="vol">Volume (between 0 and 50):</label>
      <input type="range" id="vol" name="vol" min="0" max="50" />
      <br /><br />

      <label for="gsearch">Search Google:</label>
      <input type="search" id="gsearch" name="gsearch" />
      <br /><br />

      <label for="phone">Enter your phone number:</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"
      />
      <br /><br />

      <label for="appt">Select a time:</label>
      <input type="time" id="appt" name="appt" />
      <br /><br />

      <label for="homepage">Add your homepage:</label>
      <input type="url" id="homepage" name="homepage" />
    </form>

    <h2>The select Element</h2>
    <p>The select element defines a drop-down list:</p>
    <form action="">
      <label for="cars">Choose a car:</label>
      <select id="cars" name="cars" size="3">
        <option value="volvo">Volvo</option>
        <option value="saab">Saab</option>
        <option value="fiat">Fiat</option>
        <option value="audi">Audi</option>
      </select>
      <input type="submit" />
    </form>
    <h2>Textarea</h2>

    <form action="">
      <textarea name="message" rows="10" cols="30">
The cat was playing in the garden.</textarea
      >
      <br /><br />
      <input type="submit" />
    </form>
  </body>
</html>
