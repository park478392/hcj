<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        font-family: arial, sans-serif;
        border-collapse: collapse;
        /* width: 100%; */
      }

      td,
      th {
        border: 1px solid #dddddd;
        text-align: left;
        padding: 8px;
      }

      /* tr:nth-child(even) {
        background-color: #dddddd;
      } */
    </style>
  </head>
  <body>
    <table>
      <caption>
        상품 구성
      </caption>
      <thead>
        <tr>
          <th>용도</th>
          <th>중량</th>
          <th>갯수</th>
          <th>가격</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td rowspan="2">선물용</td>
          <td>3kg</td>
          <td>11-16</td>
          <td>35,000원</td>
        </tr>
        <tr>
          <td>5kg</td>
          <td>18-26</td>
          <td>52,000원</td>
        </tr>
        <tr>
          <td rowspan="2">가정용</td>
          <td>3kg</td>
          <td>11-16</td>
          <td>30,000원</td>
        </tr>
        <tr>
          <td>5kg</td>
          <td>18-26</td>
          <td>47,000원</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td>합계</td>
          <td colspan="2"></td>
          <td>147,000원</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
